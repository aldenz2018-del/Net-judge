<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Correct AI scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    #message {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      text-align: center;
      z-index: 5;
    }

    #startBtn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      padding: 10px 20px;
      z-index: 10;
    }

    canvas {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted style="position:absolute; left:-9999px;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");

// 🔧 Adjust based on your net height
const netTop = 180;
const netBottom = 300;

let lastResult = null;
let lastTime = 0;
const DISPLAY_TIME = 7000;

startBtn.onclick = async () => {
  try {
    startBtn.style.display = "none";
    message.innerText = "Starting...";

    // ✅ Start camera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    await new Promise(resolve => video.onloadedmetadata = resolve);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    message.innerText = "Loading AI...";

    const model = await cocoSsd.load();

    message.innerText = "";

    function loop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      model.detect(video).then(predictions => {

        predictions.forEach(pred => {
          if (pred.class === "sports ball" && pred.score > 0.2) {
            const [x, y, w, h] = pred.bbox;
            const centerY = y + h / 2;

            if (centerY > netBottom) {
              lastResult = "FAULT";
              lastTime = Date.now();
            } else if (centerY >= netTop && centerY <= netBottom) {
              lastResult = "GOOD";
              lastTime = Date.now();
            }
          }
        });

        // ✅ Full screen flash result
        if (Date.now() - lastTime < DISPLAY_TIME) {
          if (lastResult === "GOOD") {
            document.body.style.background = "lime";
            message.innerText = "GOOD";
          } else if (lastResult === "FAULT") {
            document.body.style.background = "red";
            message.innerText = "FAULT";
          }
        } else {
          document.body.style.background = "black";
          message.innerText = "";
        }

        requestAnimationFrame(loop);
      });
    }

    loop();

  } catch (err) {
    message.innerText = "ERROR: " + err.message;
    console.error(err);
  }
};
</script>

</body>
</html>
