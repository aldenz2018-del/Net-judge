<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ CORRECT SCRIPT TAGS -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 40px;
      font-size: 28px;
    }

    button {
      margin-top: 20px;
      font-size: 22px;
      padding: 12px 20px;
    }

    canvas {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button onclick="start()">START</button>

<video id="video" playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let model;

async function start() {
  const message = document.getElementById("message");
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  message.innerText = "Starting camera...";

  try {
    // ✅ FORCE BACK CAMERA
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });

    video.srcObject = stream;
    await video.play();

    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    message.innerText = "Loading AI...";

    model = await cocoSsd.load();

    message.innerText = "Ready 🎾";

    function loop() {
      // draw video
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // ✅ GREEN ALIGNMENT LINE
      const ropeY = canvas.height / 2;
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, ropeY);
      ctx.lineTo(canvas.width, ropeY);
      ctx.stroke();

      model.detect(video).then(predictions => {
        predictions.forEach(pred => {
          if (pred.class === "sports ball" && pred.score > 0.3) {
            const [x, y, w, h] = pred.bbox;
            const cx = x + w / 2;
            const cy = y + h / 2;

            // ✅ draw ball marker
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
            ctx.fill();
          }
        });

        requestAnimationFrame(loop);
      });
    }

    loop();

  } catch (err) {
    message.innerText = "Camera failed ❌";
    console.error(err);
  }
}
</script>

</body>
</html>
