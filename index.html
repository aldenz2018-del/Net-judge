<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>

  <!-- ✅ Makes it behave like an app -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- ✅ AI -->
  https://cdn.jsdelivr.net/npm/@tensorflow/tfjsscript>
  https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssdscript>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      touch-action: manipulation;
    }

    #status {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      font-weight: bold;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    #startBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      padding: 12px;
      z-index: 10;
    }

    video {
      display: none;
    }
  </style>
</head>

<body>

<button id="startBtn" onclick="start()">START</button>
<div id="status">READY</div>
<video id="video" playsinline></video>

<script>
const video = document.getElementById("video");
const statusDiv = document.getElementById("status");

// 🔧 adjust this to match your rope
const netTop = 180;
const netBottom = 300;

let lastResult = null;
let lastTime = 0;
const DISPLAY_TIME = 7000;

async function start() {
  document.getElementById("startBtn").style.display = "none";

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
  await video.play();

  const model = await cocoSsd.load();

  async function detect() {
    const predictions = await model.detect(video);

    predictions.forEach(pred => {
      if (pred.class === "sports ball" && pred.score > 0.3) {
        const [x, y, w, h] = pred.bbox;
        const centerY = y + h / 2;

        if (centerY > netBottom) {
          lastResult = "FAULT";
          lastTime = Date.now();
        } 
        else if (centerY >= netTop && centerY <= netBottom) {
          lastResult = "GOOD";
          lastTime = Date.now();
        }
      }
    });

    // ✅ FULL SCREEN FLASH DISPLAY
    if (Date.now() - lastTime < DISPLAY_TIME) {
      if (lastResult === "GOOD") {
        document.body.style.background = "lime";
        statusDiv.innerText = "GOOD";
      } else if (lastResult === "FAULT") {
        document.body.style.background = "red";
        statusDiv.innerText = "FAULT";
      }
    } else {
      document.body.style.background = "black";
      statusDiv.innerText = "";
    }

    requestAnimationFrame(detect);
  }

  detect();
}
</script>

</body>
</html>
