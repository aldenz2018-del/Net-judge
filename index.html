<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: pink;
  text-align: center;
  font-family: Arial;
}

#message {
  margin-top: 20px;
  font-size: 32px;
}

button {
  margin-top: 20px;
  font-size: 24px;
  padding: 15px 25px;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div id="message">Tap START</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btn = document.getElementById("startBtn");
const msg = document.getElementById("message");

let prevFrame = null;
let lastX = null;
let lastTrigger = 0;

// 🔊 sound
function speak() {
  const s = new SpeechSynthesisUtterance("Fault");
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

// ✅ START (safe + rear camera)
btn.onclick = function () {

  msg.innerText = "Allow camera";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" } // ✅ rear camera
  })
  .then(stream => {
    video.srcObject = stream;
    return video.play();
  })
  .then(() => {

    setTimeout(() => {

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      canvas.style.display = "block";
      btn.style.display = "none";
      msg.innerText = "";

      loop();

    }, 400);

  })
  .catch(() => {
    msg.innerText = "Camera blocked ❌";
  });
};


// ✅ MAIN LOOP
function loop() {

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ vertical center line
  const midX = canvas.width / 2;

  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(midX, 0);
  ctx.lineTo(midX, canvas.height);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (prevFrame) {

    let sumX = 0;
    let count = 0;
    let totalMotion = 0;

    const curr = frame.data;
    const prev = prevFrame.data;

    for (let i = 0; i < curr.length; i += 16) {

      const idx = i / 4;
      const x = idx % canvas.width;
      const y = Math.floor(idx / canvas.width);

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      // ignore weak motion
      if (diff > 90) {

        totalMotion++;

        // ✅ ONLY small center region
        if (Math.abs(x - midX) < 60) {
          sumX += x;
          count++;
        }
      }
    }

    // ✅ ignore shake (too much global motion)
    if (count > 80 && totalMotion < 1500) {

      const avgX = sumX / count;

      if (lastX !== null) {

        const speed = Math.abs(avgX - lastX);

        // ✅ CROSSING DETECTION
        if (
          lastX < midX &&   // was left
          avgX >= midX &&   // now right
          speed > 25 &&     // fast = ball
          Date.now() - lastTrigger > 2000
        ) {
          trigger();
        }

        if (
          lastX >= midX &&
          avgX < midX &&
          speed > 25 &&
          Date.now() - lastTrigger > 2000
        ) {
          trigger();
        }
      }

      lastX = avgX;
    }
  }

  prevFrame = frame;
  requestAnimationFrame(loop);
}

// ✅ trigger result
function trigger() {
  document.body.style.background = "red";
  msg.innerText = "FAULT";

  speak();

  lastTrigger = Date.now();

  setTimeout(() => {
    document.body.style.background = "pink";
    msg.innerText = "";
  }, 1500);
}
</script>

</body>
</html>
