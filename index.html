<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: green;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 40px;
      font-size: 28px;
    }

    button {
      margin-top: 20px;
      font-size: 22px;
      padding: 12px 20px;
    }

    video {
      width: 100%;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button onclick="start()">START</button>

<video id="video" playsinline></video>

<script>
async function start() {
  const message = document.getElementById("message");
  const video = document.getElementById("video");

  message.innerText = "Requesting camera...";

  try {
    // ✅ EXACT same pattern as working test
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });

    video.srcObject = stream;

    message.innerText = "Camera Ready ✅";

  } catch (err) {
    message.innerText = "Camera failed ❌";
    console.log(err);
  }
}
</script>

</body>
</html>
