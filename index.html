<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: pink; /* ✅ default background */
      color: black;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 28px;
    }

    button {
      margin-top: 10px;
      font-size: 22px;
      padding: 12px 20px;
    }

    #stopBtn {
      background: red;
      color: white;
      display: none;
    }

    canvas {
      width: 100%;
    }

    video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef = null;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// ✅ SETTINGS
const lineWidth = 50;
let lineX;
let maxHeight;

let previousFrame = null;
let lastMotionY = null;

let lastResult = null;
let lastTime = 0;
const GOOD_TIME = 2000;
const FAULT_TIME = 5000;

// ✅ speech control
let canSpeak = true;
function speakFault() {
  if (!canSpeak) return;

  const speech = new SpeechSynthesisUtterance("Fault");
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);

  canSpeak = false;
  setTimeout(() => canSpeak = true, 1500);
}

// ✅ START (stable)
startBtn.onclick = async () => {
  try {
    startBtn.disabled = true;
    message.innerText = "Starting camera...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });

    streamRef = stream;
    video.srcObject = stream;

    await video.play();
    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    lineX = canvas.width / 2;
    maxHeight = canvas.height * 0.6;

    previousFrame = null;
    lastMotionY = null;

    running = true;

    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";
    message.innerText = "";

    loop();

  } catch (err) {
    message.innerText = "Camera blocked ❌";
    startBtn.disabled = false;
    console.error(err);
  }
};

// ✅ STOP
stopBtn.onclick = () => {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(track => track.stop());
    streamRef = null;
  }

  video.pause();
  video.srcObject = null;

  cancelAnimationFrame(animationId);
  previousFrame = null;
  lastMotionY = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";

  message.innerText = "Stopped";
  document.body.style.background = "pink";
};

// ✅ MAIN LOOP
function loop() {
  if (!running) return;

  // ✅ draw video
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ cyan detection zone
  ctx.fillStyle = "rgba(0,255,255,0.15)";
  ctx.fillRect(lineX - lineWidth, 0, lineWidth * 2, canvas.height);

  // ✅ GREEN LINE (net)
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, maxHeight);
  ctx.lineTo(canvas.width, maxHeight);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {
    const curr = frame.data;
    const prev = previousFrame.data;

    let motionY = 0;
    let count = 0;

    for (let i = 0; i < curr.length; i += 16) {
      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;

      if (Math.abs(x - lineX) > lineWidth) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        const y = Math.floor(pixelIndex / canvas.width);
        motionY += y;
        count++;
      }
