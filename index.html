<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ FIXED SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 40px;
      font-size: 28px;
    }

    button {
      margin-top: 20px;
      font-size: 22px;
      padding: 12px 20px;
    }

    #stopBtn {
      background: red;
      color: white;
      display: none;
    }

    canvas {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let model;
let streamRef = null;
let running = false;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let ropeY;
let history = [];
let lastResult = null;
let lastTime = 0;
const SHOW_TIME = 3000;

startBtn.onclick = start;
stopBtn.onclick = stop;

async function start() {
  startBtn.disabled = true;
  message.innerText = "Starting camera...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });

    streamRef = stream;
    video.srcObject = stream;

    await video.play();
    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ropeY = canvas.height / 2;

    message.innerText = "Loading AI...";

    model = await cocoSsd.load();

    // ✅ now running
    running = true;

    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";
    message.innerText = "";

    loop();

  } catch (err) {
    message.innerText = "Camera failed ❌";
    console.error(err);
    startBtn.disabled = false;
  }
}

function stop() {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(track => track.stop());
  }

  cancelAnimationFrame(animationId);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  message.innerText = "Stopped";

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";
}

function loop() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ green line
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  model.detect(video).then(predictions => {

    predictions.forEach(pred => {
      if (pred.class === "sports ball" && pred.score > 0.3) {

        const cx = pred.bbox[0] + pred.bbox[2] / 2;
        const cy = pred.bbox[1] + pred.bbox[3] / 2;

        history.push({x: cx, y: cy});
        if (history.length > 5) history.shift();

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, 2*Math.PI);
        ctx.fill();
      }
    });

    if (history.length >= 2) {
      const prev = history[history.length - 2];
      const curr = history[history.length - 1];

      const dy = curr.y - prev.y;
      const predictedY = curr.y + dy;

      if (curr.y < ropeY && predictedY >= ropeY) {
        lastResult = "FAULT";
        lastTime = Date.now();
      }

      if (curr.y >= ropeY && predictedY < ropeY) {
        lastResult = "GOOD";
        lastTime = Date.now();
      }
    }

    // ✅ flashing
    if (Date.now() - lastTime < SHOW_TIME) {
      if (lastResult === "GOOD") {
        document.body.style.background = "lime";
        message.innerText = "GOOD";
      } else if (lastResult === "FAULT") {
        document.body.style.background = "red";
        message.innerText = "FAULT";
      }
    } else {
      document.body.style.background = "black";
      message.innerText = "";
    }

    animationId = requestAnimationFrame(loop);
  });
}
</script>

</body>
</html>
``
