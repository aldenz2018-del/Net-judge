<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #message {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
      font-size: 28px;
      z-index: 5;
    }

    #startBtn {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      padding: 12px 20px;
      z-index: 10;
    }

    canvas {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted style="position:absolute; left:-9999px;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");

startBtn.onclick = async () => {
  startBtn.style.display = "none";
  message.innerText = "Allow camera";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    message.innerText = "Camera Ready ✅";

    function loop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(loop);
    }

    loop();

  } catch (err) {
    message.innerText = "Camera blocked ❌";
    console.error(err);
  }
};
</script>

</body>
</html>
