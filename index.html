<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ FIXED scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    #message {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      font-size: 30px;
      color: white;
      z-index: 5;
    }

    #startBtn {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      padding: 12px 20px;
      z-index: 10;
    }

    canvas {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted style="position:absolute; left:-9999px;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");

const ropeY = 250;

// ✅ START BUTTON
startBtn.onclick = async () => {
  startBtn.style.display = "none";
  message.innerText = "Allow camera";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    message.innerText = "Loading AI...";

    const model = await cocoSsd.load();

    message.innerText = "Ready 🎾";

    function loop() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // ✅ green line to line up net
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, ropeY);
      ctx.lineTo(canvas.width, ropeY);
      ctx.stroke();

      model.detect(video).then(predictions => {

        // ✅ ONLY show circle — no result logic yet
        predictions.forEach(pred => {
          if (pred.class === "sports ball" && pred.score > 0.3) {
            const cx = pred.bbox[0] + pred.bbox[2] / 2;
            const cy = pred.bbox[1] + pred.bbox[3] / 2;

            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
            ctx.fill();
          }
        });

        requestAnimationFrame(loop);
      });
    }

    loop();

  } catch (err) {
    message.innerText = "Camera failed ❌";
    console.error(err);
  }
};
</script>

</body>
</html>
