<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: pink;
  color: black;
  font-family: Arial;
  text-align: center;
}

#message {
  margin-top: 20px;
  font-size: 32px;
  font-weight: bold;
}

button {
  margin-top: 15px;
  font-size: 24px;
  padding: 15px 25px;
}

#stopBtn {
  background: red;
  color: white;
  display: none;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>

</head>

<body>

<div id="message">Tap START</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef = null;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let previousFrame = null;
let ropeY = 0;

let lastTriggerTime = 0;
const COOLDOWN = 2000; // 2 seconds

// ✅ voice
function speakFault() {
  const s = new SpeechSynthesisUtterance("Fault");
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(s);
}

// ✅ START
startBtn.addEventListener("click", function () {

  startBtn.disabled = true;
  message.innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" } // ✅ BACK CAMERA
  })
  .then(function(stream) {

    message.innerText = "Starting...";

    streamRef = stream;
    video.srcObject = stream;

    return video.play();
  })
  .then(function() {

    setTimeout(function() {

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ropeY = canvas.height * 0.5;

      previousFrame = null;
      running = true;

      canvas.style.display = "block";

      startBtn.style.display = "none";
      stopBtn.style.display = "inline-block";
      message.innerText = "";

      loop();

    }, 200);

  })
  .catch(function(err) {
    message.innerText = "Camera blocked ❌";
    startBtn.disabled = false;
    console.error(err);
  });
});

// ✅ STOP
stopBtn.onclick = function() {

  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(t => t.stop());
    streamRef = null;
  }

  video.pause();
  video.srcObject = null;

  cancelAnimationFrame(animationId);
  previousFrame = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  canvas.style.display = "none";

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";

  message.innerText = "Stopped";
  document.body.style.background = "pink";
};

// ✅ LOOP
function loop() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // rope line
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {

    let motionBelow = 0;

    const curr = frame.data;
    const prev = previousFrame.data;

    for (let i = 0; i < curr.length; i += 16) {

      const pixelIndex = i / 4;
      const y = Math.floor(pixelIndex / canvas.width);

      // ONLY below rope
      if (y < ropeY) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        motionBelow++;
      }
    }

    // ✅ only trigger if BIG motion spike
    if (motionBelow > 300) {

      if (Date.now() - lastTriggerTime > COOLDOWN) {

        document.body.style.background = "red";
        message.innerText = "FAULT";

        speakFault();

        lastTriggerTime = Date.now();

        // ✅ return to normal after 1.5 sec
        setTimeout(() => {
          document.body.style.background = "pink";
          message.innerText = "";
        }, 1500);
      }
    }
  }

  previousFrame = frame;
  animationId = requestAnimationFrame(loop);
}
</script>

</body>
</html>
