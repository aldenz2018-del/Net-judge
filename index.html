<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 28px;
    }

    button {
      margin-top: 10px;
      font-size: 22px;
      padding: 12px 20px;
    }

    #stopBtn {
      background: red;
      display: none;
    }

    canvas {
      width: 100%;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef = null;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// ✅ SETTINGS
let lineX;
let maxHeight;
const lineWidth = 50;

let previousFrame = null;

let lastResult = null;
let lastTime = 0;
const GOOD_TIME = 2000;
const FAULT_TIME = 5000;

// ✅ prevent speech spam
let canSpeak = true;
function speakFault() {
  if (!canSpeak) return;

  const speech = new SpeechSynthesisUtterance("Fault");
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);

  canSpeak = false;
  setTimeout(() => canSpeak = true, 1500);
}

// ✅ START
startBtn.onclick = async () => {
  try {
    startBtn.disabled = true;
    message.innerText = "Starting camera...";

    video.srcObject = null;

    let stream;

    // ✅ FORCE BACK CAMERA (safe version)
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" } }
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
    }

    streamRef = stream;
    video.srcObject = stream;

    await video.play();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    lineX = canvas.width / 2;
    maxHeight = canvas.height * 0.6;

    running = true;

    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";
    message.innerText = "";

    previousFrame = null;

    loop();

  } catch (err) {
    message.innerText = "Camera error ❌";
    startBtn.disabled = false;
    console.error(err);
  }
};

// ✅ STOP
stopBtn.onclick = () => {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(track => track.stop());
    streamRef = null;
  }

  video.pause();
  video.srcObject = null;

  cancelAnimationFrame(animationId);
  previousFrame = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";

  message.innerText = "Stopped";
  document.body.style.background = "black";
};

// ✅ LOOP
function loop() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ detection zone
  ctx.fillStyle = "rgba(0,255,255,0.15)";
  ctx.fillRect(lineX - lineWidth, 0, lineWidth * 2, canvas.height);

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {
    const curr = frame.data;
    const prev = previousFrame.data;

    let motionY = 0;
    let count = 0;

    for (let i = 0; i < curr.length; i += 16) {
      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;

      if (Math.abs(x - lineX) > lineWidth) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        const y = Math.floor(pixelIndex / canvas.width);
        motionY += y;
        count++;
      }
    }

    if (count > 80) {
      const avgY = motionY / count;

      if (avgY > maxHeight) {
        if (lastResult !== "FAULT") speakFault();
        lastResult = "FAULT";
      } else {
        lastResult = "GOOD";
      }

      lastTime = Date.now();
    }
  }

  previousFrame = frame;

  let duration = lastResult === "FAULT" ? FAULT_TIME : GOOD_TIME;

  if (Date.now() - lastTime < duration) {
    if (lastResult === "FAULT") {
      document.body.style.background = "red";
      message.innerText = "FAULT";
    } else if (lastResult === "GOOD") {
      document.body.style.background = "lime";
      message.innerText = "GOOD";
    }
  } else {
    document.body.style.background = "black";
    message.innerText = "";
  }

  animationId = requestAnimationFrame(loop);
}
</script>

</body>
</html>
