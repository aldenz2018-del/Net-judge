<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: pink;
  text-align: center;
  font-family: Arial;
}

#message {
  margin-top: 20px;
  font-size: 32px;
}

button {
  margin-top: 20px;
  font-size: 24px;
  padding: 15px 25px;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div id="message">Tap START</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const message = document.getElementById("message");

let previousFrame = null;
let ropeY = 0;
let lastMotionY = null;
let lastTrigger = 0;

// ✅ VERY SIMPLE START (this will work)
startBtn.onclick = function () {

  message.innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {

      video.srcObject = stream;
      return video.play();
    })
    .then(() => {

      // ✅ now try switching to BACK camera (safe method)
      navigator.mediaDevices.enumerateDevices().then(devices => {

        const backCam = devices.find(d =>
          d.kind === "videoinput" &&
          d.label.toLowerCase().includes("back")
        );

        if (backCam) {

          // stop current stream
          video.srcObject.getTracks().forEach(t => t.stop());

          // request back camera
          navigator.mediaDevices.getUserMedia({
            video: { deviceId: backCam.deviceId }
          })
          .then(newStream => {
            video.srcObject = newStream;
            return video.play();
          });
        }
      });

      // ✅ continue startup as usual
      setTimeout(() => {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ropeY = canvas.height * 0.5;

        canvas.style.display = "block";
        startBtn.style.display = "none";
        message.innerText = "";

        loop();

      }, 300);
    })
    .catch(() => {
      message.innerText = "Camera blocked ❌";
    });
};
// ✅ DETECTION LOOP
function loop() {

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // draw rope
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {

    let motionY = 0;
    let count = 0;

    const curr = frame.data;
    const prev = previousFrame.data;

    const centerX = canvas.width / 2;

    for (let i = 0; i < curr.length; i += 16) {

      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;
      const y = Math.floor(pixelIndex / canvas.width);

      // ✅ center only
      if (Math.abs(x - centerX) > 80) continue;

      // ✅ under rope only
      if (y < ropeY) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        motionY += y;
        count++;
      }
    }

    if (count > 100) {

      const avgY = motionY / count;

      if (lastMotionY !== null) {

        const speed = Math.abs(avgY - lastMotionY);

        // ✅ FAST ONLY (no running/shake)
        if (speed > 20 && Date.now() - lastTrigger > 2000) {

          document.body.style.background = "red";
          message.innerText = "FAULT";

          const s = new SpeechSynthesisUtterance("Fault");
          speechSynthesis.speak(s);

          lastTrigger = Date.now();

          setTimeout(() => {
            document.body.style.background = "pink";
            message.innerText = "";
          }, 1500);
        }
      }

      lastMotionY = avgY;
    }
  }

  previousFrame = frame;
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
