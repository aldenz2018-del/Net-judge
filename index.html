<!DOCTYPE html>
<html>
<head>
  <title>Net Judge</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  https://cdn.jsdelivr.net/npm/@tensorflow/tfjsscript>
  https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssdscript>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    #status {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      font-weight: bold;
      color: white;
      z-index: 10;
    }

    #startBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      padding: 10px;
      z-index: 20;
    }

    canvas {
      width: 100vw;
      height: 100vh;
    }

    video {
      display: none;
    }
  </style>
</head>

<body>

<button id="startBtn" onclick="start()">START</button>
<div id="status">READY</div>
<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusDiv = document.getElementById("status");

const netTop = 180;
const netBottom = 300;

let lastResult = null;
let lastTime = 0;
const DISPLAY_TIME = 7000;

async function start() {
  document.getElementById("startBtn").style.display = "none";

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  await video.play();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const model = await cocoSsd.load();

  function loop() {
    // ✅ DRAW VIDEO TO CANVAS (fixes black screen)
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    model.detect(video).then(predictions => {
      predictions.forEach(pred => {
        if (pred.class === "sports ball" && pred.score > 0.2) {
          const [x, y, w, h] = pred.bbox;
          const centerY = y + h / 2;

          if (centerY > netBottom) {
            lastResult = "FAULT";
            lastTime = Date.now();
          } else if (centerY >= netTop && centerY <= netBottom) {
            lastResult = "GOOD";
            lastTime = Date.now();
          }
        }
      });

      // ✅ FULL SCREEN FLASH
      if (Date.now() - lastTime < DISPLAY_TIME) {
        if (lastResult === "GOOD") {
          document.body.style.background = "lime";
          statusDiv.innerText = "GOOD";
        } else if (lastResult === "FAULT") {
          document.body.style.background = "red";
          statusDiv.innerText = "FAULT";
        }
      } else {
        document.body.style.background = "black";
        statusDiv.innerText = "";
      }

      requestAnimationFrame(loop);
    });
  }

  loop();
}
</script>

</body>
</html>
