<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>  
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    #message {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 20px;
      font-size: 40px;
      color: white;
      z-index: 5;
    }

   #startBtn {
  position: absolute;
  top: 85px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  padding: 10px;
  z-index: 10;
}
``
    canvas {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted style="position:absolute; left:-9999px;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");

// 🔧 adjust this
const ropeY = 250;

let lastResult = null;
let lastTime = 0;
const DISPLAY_TIME = 7000;

// ✅ TRACKING STATE
let history = [];

startBtn.onclick = async () => {
  startBtn.style.display = "none";
  message.innerText = "Starting...";

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
  await video.play();

  await new Promise(r => video.onloadedmetadata = r);

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  message.innerText = "Loading AI...";
  const model = await cocoSsd.load();

  message.innerText = "";

  function loop() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // ✅ draw rope line
    ctx.strokeStyle = "lime";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, ropeY);
    ctx.lineTo(canvas.width, ropeY);
    ctx.stroke();

    model.detect(video).then(predictions => {

      let found = false;

      predictions.forEach(pred => {
        if (pred.class === "sports ball" && pred.score > 0.2) {

          const cx = pred.bbox[0] + pred.bbox[2] / 2;
          const cy = pred.bbox[1] + pred.bbox[3] / 2;

          found = true;

          // ✅ store history
          history.push({ x: cx, y: cy, t: Date.now() });
          if (history.length > 5) history.shift();

          // draw ball
          ctx.fillStyle = "yellow";
          ctx.beginPath();
          ctx.arc(cx, cy, 8, 0, 2*Math.PI);
          ctx.fill();
        }
      });

      // ✅ CROSSING DETECTION (key upgrade!)
      if (history.length >= 2) {
        let prev = history[history.length - 2];
        let curr = history[history.length - 1];

        // did it cross the line?
        if (prev.y < ropeY && curr.y >= ropeY) {
          lastResult = "FAULT";
          lastTime = Date.now();
        }

        if (prev.y >= ropeY && curr.y < ropeY) {
          lastResult = "GOOD";
          lastTime = Date.now();
        }
      }

      // ✅ FULL SCREEN FLASH
      if (Date.now() - lastTime < DISPLAY_TIME) {
        if (lastResult === "GOOD") {
          document.body.style.background = "lime";
          message.innerText = "GOOD";
        }
        if (lastResult === "FAULT") {
          document.body.style.background = "red";
          message.innerText = "FAULT";
        }
      } else {
        document.body.style.background = "black";
        message.innerText = "";
      }

      requestAnimationFrame(loop);
    });
  }

  loop();
};
</script>

</body>
</html>
