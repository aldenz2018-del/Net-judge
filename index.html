<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: black;
  text-align: center;
  font-family: Arial;
}

#ui {
  position: fixed;
  top: 20px;
  width: 100%;
  color: white;
}

#msg {
  font-size: 32px;
  margin-bottom: 15px;
}

button {
  font-size: 24px;
  padding: 15px 25px;
}

canvas {
  width: 100%;
}

video {
  display: none;
}
</style>
</head>

<body>

<div id="ui">
  <div id="msg">Loading…</div>
  <button id="startBtn">START</button>
</div>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btn = document.getElementById("startBtn");
const msg = document.getElementById("msg");

// ✅ detect phone vs laptop
const isPhone = /iPhone|Android/i.test(navigator.userAgent);

// ✅ state
let prevFrame = null;
let ropeY = 0;
let lastX = null;
let lastTrigger = 0;

// ✅ phone mode only
if (!isPhone) {
  msg.innerText = "Viewing… (use phone to start)";
  btn.style.display = "none";
}

// 🔊 sound
function speak() {
  const s = new SpeechSynthesisUtterance("Fault");
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

// ✅ START BUTTON (ONLY ON PHONE)
btn.onclick = function () {

  msg.innerText = "Allow camera";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {

    video.srcObject = stream;
    return video.play();
  })
  .then(() => {

    setTimeout(() => {

      // ✅ IMPORTANT FIX (this was breaking your video)
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ropeY = canvas.height * 0.5;

      msg.innerText = "";
      btn.style.display = "none";

      loop();

    }, 500);

  })
  .catch(err => {
    msg.innerText = "Camera blocked ❌";
    console.log(err);
  });
};


// ✅ MAIN LOOP (DRAW VIDEO + OVERLAY)
function loop() {

  if (video.readyState >= 2) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  }

  const midX = canvas.width / 2;

  // ✅ vertical crossing line
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(midX, 0);
  ctx.lineTo(midX, canvas.height);
  ctx.stroke();

  // ✅ rope line
  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (prevFrame) {

    let sumX = 0;
    let sumY = 0;
    let count = 0;
    let totalMotion = 0;

    const curr = frame.data;
    const prev = prevFrame.data;

    for (let i = 0; i < curr.length; i += 16) {

      const idx = i / 4;
      const x = idx % canvas.width;
      const y = Math.floor(idx / canvas.width);

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 90) {

        totalMotion++;

        if (Math.abs(x - midX) < 80) {
          sumX += x;
          sumY += y;
          count++;
        }
      }
    }

    if (count > 60 && totalMotion < 1500) {

      const avgX = sumX / count;
      const avgY = sumY / count;

      if (lastX !== null) {

        const speed = Math.abs(avgX - lastX);

        if (
          lastX < midX &&
          avgX >= midX &&
          speed > 20 &&
          avgY >= ropeY &&
          Date.now() - lastTrigger > 2000
        ) {
          trigger();
        }

        if (
          lastX >= midX &&
          avgX < midX &&
          speed > 20 &&
          avgY >= ropeY &&
          Date.now() - lastTrigger > 2000
        ) {
          trigger();
        }
      }

      lastX = avgX;
    }
  }

  prevFrame = frame;
  requestAnimationFrame(loop);
}


// ✅ TRIGGER
function trigger() {

  msg.innerText = "FAULT";
  msg.style.color = "red";

  speak();

  lastTrigger = Date.now();

  setTimeout(() => {
    msg.innerText = "";
    msg.style.color = "white";
  }, 1500);
}
</script>

</body>
</html>
