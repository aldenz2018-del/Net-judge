<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BasementBall</title>

  <style>
    body {
      margin: 0;
      background: green;
      color: black;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    button {
      margin-top: 15px;
      font-size: 24px;
      padding: 15px 25px;
    }

    #stopBtn {
      background: red;
      color: white;
      display: none;
    }

    canvas {
      width: 100%;
    }

    /* hide raw camera feed */
    video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
  </style>
</head>

<body>

<div id="message">Tap START</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef = null;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let previousFrame = null;
let ropeY = 0;
let lastFaultTime = 0;

// ✅ voice
function speakFault() {
  const s = new SpeechSynthesisUtterance("Fault");
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(s);
}

// ✅ START (FIXED + RELIABLE)
startBtn.onclick = async () => {
  startBtn.disabled = true;
  message.innerText = "Tap Allow";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });

    message.innerText = "Starting...";

    streamRef = stream;
    video.srcObject = stream;

    // ✅ must happen after click
    await video.play();

    // ✅ small delay prevents Safari hang
    setTimeout(() => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ropeY = canvas.height * 0.5;

      previousFrame = null;
      running = true;

      startBtn.style.display = "none";
      stopBtn.style.display = "inline-block";
      message.innerText = "";

      loop();
    }, 200);

  } catch (err) {
    message.innerText = "Camera blocked ❌";
    startBtn.disabled = false;
    console.error(err);
  }
};

// ✅ STOP
stopBtn.onclick = () => {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(track => track.stop());
    streamRef = null;
  }

  video.pause();
  video.srcObject = null;

  cancelAnimationFrame(animationId);
  previousFrame = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";

  message.innerText = "Stopped";
  document.body.style.background = "pink";
};

// ✅ MAIN LOOP
function loop() {
  if (!running) return;

  // draw camera
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ rope line
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {
    const curr = frame.data;
    const prev = previousFrame.data;

    let motionBelow = 0;

    for (let i = 0; i < curr.length; i += 16) {
      const pixelIndex = i / 4;
      const y = Math.floor(pixelIndex / canvas.width);

      // ✅ ONLY detect BELOW rope
      if (y < ropeY) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        motionBelow++;
      }
    }

    // ✅ trigger FAULT
    if (motionBelow > 120) {

      if (Date.now() - lastFaultTime > 1500) {
        document.body.style.background = "red";
        message.innerText = "FAULT";
        speakFault();
        lastFaultTime = Date.now();
