<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: black;
  text-align: center;
  font-family: Arial;
}

#ui {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
}

#msg {
  font-size: 36px;
  margin-bottom: 20px;
}

button {
  font-size: 24px;
  padding: 15px 25px;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div id="ui">
  <div id="msg">Tap START</div>
  <button id="startBtn">START</button>
</div>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const btn = document.getElementById("startBtn");
const msg = document.getElementById("msg");

let prevFrame = null;
let ropeY = 0;

let lastX = null;
let lastTrigger = 0;

// ✅ sound
function speak() {
  const s = new SpeechSynthesisUtterance("Fault");
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

// ✅ detect if this device should run camera
function isPhone() {
  return /iPhone|Android/i.test(navigator.userAgent);
}

// ✅ START BUTTON (THIS PART IS SAFE)
btn.onclick = function () {

  // 💻 Laptop just shows screen
  if (!isPhone()) {
    msg.innerText = "Viewer Mode";
    return;
  }

  msg.innerText = "Allow camera";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" } // ✅ rear cam
  })
  .then(stream => {
    video.srcObject = stream;
    return video.play();
  })
  .then(() => {

    setTimeout(() => {

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      ropeY = canvas.height * 0.5;

      canvas.style.display = "block";
      btn.style.display = "none";
      msg.innerText = "";

      loop();

    }, 400);

  })
  .catch(() => {
    msg.innerText = "Camera blocked ❌";
  });
};


// ✅ MAIN LOOP
function loop() {

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const midX = canvas.width / 2;

  // ✅ vertical crossing line
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(midX, 0);
  ctx.lineTo(midX, canvas.height);
  ctx.stroke();

  // ✅ rope height line
  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (prevFrame) {

    let sumX = 0;
    let sumY = 0;
    let count = 0;
    let totalMotion = 0;

    const curr = frame.data;
    const prev = prevFrame.data;

    for (let i = 0; i < curr.length; i += 16) {

      const idx = i / 4;
      const x = idx % canvas.width;
      const y = Math.floor(idx / canvas.width);

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 90) {

        totalMotion++;

        // ✅ center strip only
        if (Math.abs(x - midX) < 80) {
          sumX += x;
          sumY += y;
          count++;
        }
      }
    }

    // ✅ ignore camera shake
    if (count > 60 && totalMotion < 1500) {

      const avgX = sumX / count;
      const avgY = sumY / count;

      if (lastX !== null) {

        const speed = Math.abs(avgX - lastX);

        // ✅ CROSSING + HEIGHT CHECK
        if (
          lastX < midX &&
          avgX >= midX &&
          speed > 20 &&
          avgY >= ropeY &&   // BELOW rope
          Date.now() - lastTrigger > 2000
        ) {
          trigger();
        }

        if (
          lastX >= midX &&
          avgX < midX &&
          speed > 20 &&
          avgY >= ropeY &&
          Date.now() - lastTrigger > 2000
        ) {
          trigger();
        }
      }

      lastX = avgX;
    }
  }

  prevFrame = frame;
  requestAnimationFrame(loop);
}


// ✅ TRIGGER
function trigger() {

  msg.innerText = "FAULT";
  msg.style.color = "red";

  speak();

  lastTrigger = Date.now();

  setTimeout(() => {
    msg.innerText = "";
    msg.style.color = "white";
  }, 1500);
}
</script>

</body>
</html>
