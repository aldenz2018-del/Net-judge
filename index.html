<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ APP ICON (PUT icon.png IN SAME FOLDER) -->
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body {
      margin: 0;
      background: green;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 28px;
    }

    button {
      margin-top: 10px;
      font-size: 22px;
      padding: 12px 20px;
    }

    #stopBtn {
      background: red;
      display: none;
    }

    canvas {
      width: 100%;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef = null;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// detection settings
let lineX;
let maxHeight;
const lineWidth = 50;

let previousFrame = null;
let lastResult = null;
let lastTime = 0;
const GOOD_TIME = 2000;
const FAULT_TIME = 4000;

// speech control
let canSpeak = true;

function speakFault() {
  if (!canSpeak) return;

  window.speechSynthesis.speak(
    new SpeechSynthesisUtterance("Fault")
  );

  canSpeak = false;
  setTimeout(() => canSpeak = true, 2000);
}

// ✅ START (SIMPLE + RELIABLE)
startBtn.onclick = async () => {
  try {
    message.innerText = "Starting camera...";

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });

    streamRef = stream;
    video.srcObject = stream;

    await video.play();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    lineX = canvas.width / 2;
    maxHeight = canvas.height * 0.6;

    running = true;

    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";
    message.innerText = "";

    loop();

  } catch (err) {
    message.innerText = "Camera blocked ❌";
  }
};

// ✅ STOP (FULL RESET)
stopBtn.onclick = () => {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(t => t.stop());
    streamRef = null;
  }

  video.pause();
  video.srcObject = null;

  cancelAnimationFrame(animationId);
  previousFrame = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  startBtn.style.display = "inline-block";
  stopBtn.style.display = "none";
  message.innerText = "Stopped";
};

// ✅ MAIN LOOP
function loop() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // detection zone
  ctx.fillStyle = "rgba(0,255,255,0.15)";
  ctx.fillRect(lineX - lineWidth, 0, lineWidth * 2, canvas.height);

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {
    let motionY = 0;
    let count = 0;

    const curr = frame.data;
    const prev = previousFrame.data;

    for (let i = 0; i < curr.length; i += 16) {
      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;

      if (Math.abs(x - lineX) > lineWidth) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        const y = Math.floor(pixelIndex / canvas.width);
        motionY += y;
        count++;
      }
    }

    if (count > 80) {
      const avgY = motionY / count;

      if (avgY > maxHeight) {
        if (lastResult !== "FAULT") speakFault();
        lastResult = "FAULT";
      } else {
        lastResult = "GOOD";
      }

      lastTime = Date.now();
    }
  }

  previousFrame = frame;

  let duration = lastResult === "FAULT" ? FAULT_TIME : GOOD_TIME;

  if (Date.now() - lastTime < duration) {
    if (lastResult === "FAULT") {
      document.body.style.background = "red";
      message.innerText = "FAULT";
    } else {
      document.body.style.background = "lime";
      message.innerText = "GOOD";
    }
  } else {
    document.body.style.background = "black";
    message.innerText = "";
  }

  animationId = requestAnimationFrame(loop);
}
</script>

</body>
</html>
