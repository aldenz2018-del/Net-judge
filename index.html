<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ CORRECT SCRIPT TAGS -->
  https://cdn.jsdelivr.net/npm/@tensorflow/tfjsscript>
  https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssdscript>

  <style>
    body {
      margin: 0;
      background: pink;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 28px;
    }

    button {
      margin-top: 10px;
      font-size: 22px;
      padding: 12px 20px;
    }

    #stopBtn {
      background: red;
      color: white;
      display: none;
    }

    canvas {
      width: 100%;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button id="startBtn" onclick="start()">START</button>
<button id="stopBtn" onclick="stop()">STOP</button>

<video id="video" playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let model;
let running = false;
let streamRef;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// ✅ DETECTION SETTINGS
let lineX;
let maxHeight;

// ✅ TRACKING
let history = [];
let lastResult = null;
let lastTime = 0;
const SHOW_TIME = 3000;

async function start() {
  startBtn.disabled = true;
  message.innerText = "Starting camera...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });

    streamRef = stream;
    video.srcObject = stream;

    await video.play();
    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // ✅ set line positions
    lineX = canvas.width / 2;
    maxHeight = canvas.height * 0.6;

    message.innerText = "Loading AI...";

    model = await cocoSsd.load();

    running = true;

    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";
    message.innerText = "";

    loop();

  } catch (err) {
    message.innerText = "Camera error ❌";
    console.error(err);
    startBtn.disabled = false;
  }
}

function stop() {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(track => track.stop());
  }

  cancelAnimationFrame(animationId);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  message.innerText = "Stopped";

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";
}

function loop() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ VERTICAL LINE
  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lineX, 0);
  ctx.lineTo(lineX, canvas.height);
  ctx.stroke();

  // ✅ HEIGHT LINE
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(0, maxHeight);
  ctx.lineTo(canvas.width, maxHeight);
  ctx.stroke();

  model.detect(video).then(predictions => {

    predictions.forEach(pred => {
      if (pred.class === "sports ball" && pred.score > 0.2) {

        const x = pred.bbox[0];
        const y = pred.bbox[1];
        const w = pred.bbox[2];
        const h = pred.bbox[3];

        const cx = x + w / 2;
        const cy = y + h / 2;

        // store movement history
        history.push({x: cx, y: cy});
        if (history.length > 5) history.shift();

        // draw ball
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
        ctx.fill();
      }
    });

    // ✅ CROSSING + HEIGHT LOGIC
    if (history.length >= 2) {
      const prev = history[history.length - 2];
      const curr = history[history.length - 1];

      const dx = curr.x - prev.x;
      const predictedX = curr.x + dx;

      // crossing left → right
      if (curr.x < lineX && predictedX >= lineX) {

        if (curr.y > maxHeight) {
          lastResult = "FAULT";
        } else {
          lastResult = "GOOD";
        }

        lastTime = Date.now();
      }
    }

    // ✅ RESULT DISPLAY
    if (Date.now() - lastTime < SHOW_TIME) {
      if (lastResult === "GOOD") {
        document.body.style.background = "lime";
        message.innerText = "GOOD";
      } else if (lastResult === "FAULT") {
        document.body.style.background = "red";
        message.innerText = "FAULT";
      }
    } else {
      document.body.style.background = "black";
      message.innerText = "";
    }

    animationId = requestAnimationFrame(loop);
  });
}
</script>

</body>
</html>
``
