<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: black;
  color: black;
  font-family: Arial;
  text-align: center;
}

#message {
  margin-top: 20px;
  font-size: 32px;
  font-weight: bold;
}

button {
  margin-top: 15px;
  font-size: 24px;
  padding: 15px 25px;
}

#stopBtn {
  background: red;
  color: white;
  display: none;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div id="message">Tap START</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef = null;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

let previousFrame = null;
let ropeY = 0;

let lastTriggerTime = 0;
const COOLDOWN = 2000;

let lastMotionY = null;

function speakFault() {
  const s = new SpeechSynthesisUtterance("Fault");
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(s);
}

// ✅ GUARANTEED WORKING START
startBtn.onclick = function () {

  startBtn.disabled = true;
  message.innerText = "Tap Allow";

  navigator.mediaDevices.getUserMedia({
    video: true   // ✅ IMPORTANT: DON'T FORCE BACK CAMERA YET
  })
  .then(function(stream) {

    // ✅ Try switching to back camera AFTER successful start
    navigator.mediaDevices.enumerateDevices().then(devices => {
      const backCam = devices.find(d =>
        d.kind === "videoinput" &&
        d.label.toLowerCase().includes("back")
      );

      if (backCam) {
        stream.getTracks().forEach(t => t.stop());

        navigator.mediaDevices.getUserMedia({
          video: { deviceId: backCam.deviceId }
        }).then(s2 => {
          streamRef = s2;
          video.srcObject = s2;
          video.play();
        });
      } else {
        streamRef = stream;
        video.srcObject = stream;
        video.play();
      }
    });

    message.innerText = "Starting...";

    video.srcObject = stream;
    return video.play();
  })
  .then(function() {

    setTimeout(function() {

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ropeY = canvas.height * 0.5;

      previousFrame = null;
      lastMotionY = null;

      running = true;

      canvas.style.display = "block";

      startBtn.style.display = "none";
      stopBtn.style.display = "inline-block";
      message.innerText = "";

      loop();

    }, 200);

  })
  .catch(function(err) {
    message.innerText = "Camera blocked ❌";
    startBtn.disabled = false;
    console.log(err);
  });
};

// ✅ STOP
stopBtn.onclick = function() {

  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(t => t.stop());
    streamRef = null;
  }

  video.pause();
  video.srcObject = null;

  cancelAnimationFrame(animationId);
  previousFrame = null;
  lastMotionY = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  canvas.style.display = "none";

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";

  message.innerText = "Stopped";
  document.body.style.background = "pink";
};

  ctx.line
