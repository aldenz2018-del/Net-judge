<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: pink;
  text-align: center;
  font-family: Arial;
}

#message {
  margin-top: 20px;
  font-size: 32px;
}

button {
  margin-top: 20px;
  font-size: 24px;
  padding: 15px 25px;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div id="message">Happy 11th Birthday Mattie!</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const message = document.getElementById("message");

let previousFrame = null;
let ropeY = 0;
let lastMotionY = null;
let lastTrigger = 0;

// 🔊 sound
function speakFault() {
  const s = new SpeechSynthesisUtterance("Fault");
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

// ✅ START (stable)
startBtn.onclick = function () {

  message.innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" } // ✅ back camera
  })
  .then(stream => {

    video.srcObject = stream;
    return video.play();
  })
  .then(() => {

    // ✅ delay fixes blank screen + iPhone timing
    setTimeout(() => {

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      ropeY = canvas.height * 0.5;

      canvas.style.display = "block";
      startBtn.style.display = "none";
      message.innerText = "";

      loop();

    }, 500);
  })
  .catch(() => {
    message.innerText = "Camera blocked ❌";
  });
};


// ✅ LOOP
function loop() {

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // rope line
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {

    let motionBelow = 0;
    let totalMotion = 0;
    let motionY = 0;

    const curr = frame.data;
    const prev = previousFrame.data;

    const centerX = canvas.width / 2;

    for (let i = 0; i < curr.length; i += 16) {

      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;
      const y = Math.floor(pixelIndex / canvas.width);

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 80) { // ✅ higher threshold

        totalMotion++;

        // ✅ only center zone
        if (Math.abs(x - centerX) < 80 && y >= ropeY) {
          motionBelow++;
          motionY += y;
        }
      }
    }

    // ✅ FILTER: ignore full-frame shake
    if (motionBelow > 200 && totalMotion < 2000) {

      const avgY = motionY / motionBelow;

      if (lastMotionY !== null) {
        const speed = Math.abs(avgY - lastMotionY);

        // ✅ trigger only FAST motion
        if (speed > 20 && Date.now() - lastTrigger > 2000) {

          document.body.style.background = "red";
          message.innerText = "FAULT";

          speakFault();

          lastTrigger = Date.now();

          setTimeout(() => {
            document.body.style.background = "pink";
            message.innerText = "";
          }, 1500);
        }
      }

      lastMotionY = avgY;
    }
  }

  previousFrame = frame;
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
