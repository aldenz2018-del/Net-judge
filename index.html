<!DOCTYPE html>
<html>
<head>
  <title>BasementBall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: pink;
      color: white;
      font-family: ariel;
      text-align: center;
    }

    #message {
      margin-top: 20px;
      font-size: 28px;
    }

    button {
      margin-top: 10px;
      font-size: 22px;
      padding: 12px 20px;
    }

    #stopBtn {
      background: red;
      color: white;
      display: none;
    }

    canvas {
      width: 100%;
    }
  </style>
</head>

<body>

<div id="message">🎉 Happy 11th Birthday Mattie 🎉</div>

<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<video id="video" playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
let running = false;
let streamRef;
let animationId;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// ✅ SETTINGS
let lineX;
let maxHeight;
const lineWidth = 50; // ✅ requested width

let previousFrame = null;

let lastResult = null;
let lastTime = 0;
const SHOW_TIME = 6000;

startBtn.onclick = start;
stopBtn.onclick = stop;

async function start() {
  startBtn.disabled = false;
  message.innerText = "Starting camera...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });

    streamRef = stream;
    video.srcObject = stream;

    await video.play();
    await new Promise(r => video.onloadedmetadata = r);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    lineX = canvas.width / 2;
    maxHeight = canvas.height * 0.6;

    running = true;

    startBtn.style.display = "none";
    stopBtn.style.display = "inline-block";
    message.innerText = "";

    loop();

  } catch (err) {
    message.innerText = "Camera error ❌";
    console.error(err);
    startBtn.disabled = false;
  }
}

function stop() {
  running = false;

  if (streamRef) {
    streamRef.getTracks().forEach(track => track.stop());
  }

  cancelAnimationFrame(animationId);

  previousFrame = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  message.innerText = "Stopped";

  startBtn.style.display = "inline-block";
  startBtn.disabled = false;
  stopBtn.style.display = "none";

  document.body.style.background = "black";
}

function loop() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ DRAW DETECTION ZONE (cyan)
  ctx.fillStyle = "rgba(0,255,255,0.15)";
  ctx.fillRect(lineX - lineWidth, 0, lineWidth * 2, canvas.height);

  // ✅ DRAW CENTER LINE
  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lineX, 0);
  ctx.lineTo(lineX, canvas.height);
  ctx.stroke();

  // ✅ DRAW HEIGHT LINE (red)
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(0, maxHeight);
  ctx.lineTo(canvas.width, maxHeight);
  ctx.stroke();

  const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {
    const curr = currentFrame.data;
    const prev = previousFrame.data;

    let motionX = 0;
    let motionY = 0;
    let count = 0;

    // ✅ ONLY CHECK LINE ZONE
    for (let i = 0; i < curr.length; i += 16) {

      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;
      const y = Math.floor(pixelIndex / canvas.width);

      // ✅ ONLY NEAR LINE
      if (Math.abs(x - lineX) > lineWidth) continue;

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 60) {
        motionX += x;
        motionY += y;
        count++;
      }
    }

    // ✅ VALID MOTION
    if (count > 80) {
      const avgX = motionX / count;
      const avgY = motionY / count;

      // draw motion point
      ctx.fillStyle = "yellow";
      ctx.beginPath();
      ctx.arc(avgX, avgY, 6, 0, 2*Math.PI);
      ctx.fill();

      // ✅ TRIGGER
      if (avgY > maxHeight) {
        lastResult = "FAULT";
      } else {
        lastResult = "GOOD";
      }

      lastTime = Date.now();
    }
  }

  previousFrame = currentFrame;

  // ✅ FLASH RESULT
  if (Date.now() - lastTime < SHOW_TIME) {
    if (lastResult === "GOOD") {
      document.body.style.background = "lime";
      message.innerText = "GOOD";
    } else if (lastResult === "FAULT") {
      document.body.style.background = "red";
      message.innerText = "FAULT";
    }
  } else {
    document.body.style.background = "black";
    message.innerText = "";
  }

  animationId = requestAnimationFrame(loop);
}
</script>

</body>
</html>
