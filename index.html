<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BasementBall</title>

<style>
body {
  margin: 0;
  background: pink;
  text-align: center;
  font-family: Arial;
}

#message {
  margin-top: 20px;
  font-size: 32px;
}

button {
  margin-top: 20px;
  font-size: 24px;
  padding: 15px 25px;
}

canvas {
  width: 100%;
  display: none;
}

video {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div id="message">Tap START</div>
<button id="startBtn">START</button>

<video id="video" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const message = document.getElementById("message");

let previousFrame = null;
let ropeY = 0;

let lastY = null;
let lastTrigger = 0;

// 🔊 sound
function speakFault() {
  const s = new SpeechSynthesisUtterance("Fault");
  speechSynthesis.cancel();
  speechSynthesis.speak(s);
}

// ✅ STABLE START
startBtn.onclick = function () {

  message.innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({
    video: true
  })
  .then(stream => {

    video.srcObject = stream;
    return video.play();
  })
  .then(() => {

    // ✅ after camera works, try to switch to back camera
    navigator.mediaDevices.enumerateDevices().then(devices => {
      const backCam = devices.find(d =>
        d.kind === "videoinput" &&
        d.label.toLowerCase().includes("back")
      );

      if (backCam) {
        video.srcObject.getTracks().forEach(t => t.stop());

        navigator.mediaDevices.getUserMedia({
          video: { deviceId: backCam.deviceId }
        }).then(s2 => {
          video.srcObject = s2;
          video.play();
        });
      }
    });

    setTimeout(() => {

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      ropeY = canvas.height * 0.5;

      canvas.style.display = "block";
      startBtn.style.display = "none";
      message.innerText = "";

      previousFrame = null;
      lastY = null;

      loop();

    }, 400);
  })
  .catch(() => {
    message.innerText = "Camera blocked ❌";
  });
};

// ✅ MAIN LOOP
function loop() {

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // draw rope
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, ropeY);
  ctx.lineTo(canvas.width, ropeY);
  ctx.stroke();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (previousFrame) {

    let motionY = 0;
    let count = 0;
    let totalMotion = 0;

    const curr = frame.data;
    const prev = previousFrame.data;

    const centerX = canvas.width / 2;

    for (let i = 0; i < curr.length; i += 16) {

      const pixelIndex = i / 4;
      const x = pixelIndex % canvas.width;
      const y = Math.floor(pixelIndex / canvas.width);

      const diff =
        Math.abs(curr[i] - prev[i]) +
        Math.abs(curr[i+1] - prev[i+1]) +
        Math.abs(curr[i+2] - prev[i+2]);

      if (diff > 80) {

        totalMotion++;

        // ✅ focus on center + BELOW rope
        if (Math.abs(x - centerX) < 80 && y >= ropeY) {
          motionY += y;
          count++;
        }
      }
    }

    // ✅ ignore camera shake
    if (count > 100 && totalMotion < 2000) {

      const avgY = motionY / count;

      if (lastY !== null) {

        const speed = Math.abs(avgY - lastY);

        // ✅ CROSSING detection
        if (
          lastY < ropeY &&      // was ABOVE
          avgY >= ropeY &&      // now BELOW
          speed > 20 &&         // fast (ball-like)
          Date.now() - lastTrigger > 2000
        ) {

          document.body.style.background = "red";
          message.innerText = "FAULT";

          speakFault();

          lastTrigger = Date.now();

          setTimeout(() => {
            document.body.style.background = "pink";
            message.innerText = "";
          },
